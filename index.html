<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Museum — WBUAFS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d2d50; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .poster { width: 100%; max-width: 480px; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 40px #0008; background: #b8ddef; }
  .poster-header { background: #1a4a6e; color: #fff; text-align: center; padding: 14px 16px; }
  .logo-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .logo { width: 44px; height: 44px; background: #ffffff22; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .uni-text { text-align: left; }
  .uni { font-size: 12px; font-weight: 600; }
  .faculty { font-size: 10px; opacity: 0.85; margin-top: 2px; }
  .dept { font-size: 10px; opacity: 0.75; margin-top: 1px; }
  .poster-body { background: linear-gradient(170deg, #cce8f5 0%, #a0d4ea 60%, #85c4e0 100%); padding: 20px 20px 16px; }
  .fish-name { text-align: center; font-size: 28px; font-weight: 700; color: #0d2d50; line-height: 1.1; }
  .sci-name { text-align: center; font-size: 15px; font-style: italic; color: #1a4a6e; font-weight: 600; margin-top: 4px; margin-bottom: 14px; }
  .fish-img-wrap { text-align: center; margin: 10px 0 16px; min-height: 120px; display: flex; align-items: center; justify-content: center; }
  .fish-img-wrap img { max-width: 300px; max-height: 130px; object-fit: contain; border-radius: 8px; filter: drop-shadow(0 2px 8px #0003); }
  .fish-img-placeholder { width: 240px; height: 100px; background: #1a4a6e1a; border: 1.5px dashed #1a4a6e55; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #1a4a6e88; font-size: 13px; }
  .divider { height: 2px; background: linear-gradient(90deg, transparent, #1a4a6e55, transparent); margin: 10px 0; }
  .section-title { text-align: center; font-weight: 700; font-size: 13px; color: #0d2d50; text-transform: uppercase; letter-spacing: 0.8px; margin: 14px 0 8px; }
  .info-row { font-size: 13px; color: #0d2d50; line-height: 1.6; text-align: center; }
  .info-row b { font-weight: 600; }
  .info-block { font-size: 13px; color: #0d2d50; line-height: 1.6; text-align: center; }
  .commercial-note { font-size: 12px; color: #0d2d50bb; text-align: center; font-style: italic; margin-top: 12px; padding: 8px 12px; background: #1a4a6e11; border-radius: 8px; line-height: 1.5; }
  .gallery-wrap { width: 100%; max-width: 900px; }
  .gallery-header { text-align: center; margin-bottom: 28px; }
  .gallery-dept { font-size: 15px; font-weight: 700; color: #a8d8ea; margin-top: 6px; letter-spacing: 0.3px; }
  .gallery-header h1 { font-size: 26px; font-weight: 700; color: #cce8f5; }
  .gallery-header p { font-size: 14px; color: #85c4e0; margin-top: 6px; }
  .search-bar { width: 100%; padding: 10px 16px; border-radius: 40px; border: none; font-size: 15px; margin-bottom: 20px; background: #ffffff18; color: #fff; outline: none; }
  .search-bar::placeholder { color: #ffffff66; }
  .species-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .species-card { background: #1a4a6e; border-radius: 12px; padding: 14px; cursor: pointer; transition: background 0.15s, transform 0.15s; text-decoration: none; display: block; }
  .species-card:hover { background: #245a84; transform: translateY(-2px); }
  .species-card .cn { font-size: 15px; font-weight: 600; color: #cce8f5; }
  .species-card .sn { font-size: 12px; font-style: italic; color: #85c4e0; margin-top: 3px; }
  .species-card .fam { font-size: 11px; color: #ffffff66; margin-top: 5px; }
  .center-msg { text-align: center; color: #85c4e0; font-size: 16px; padding: 40px; }
  .error-msg { background: #5c1a1a; color: #f4b4b4; border-radius: 12px; padding: 24px; font-size: 14px; line-height: 1.9; max-width: 520px; }
  .error-msg code { background: #ffffff22; padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  .error-msg ol { margin-left: 18px; margin-top: 8px; }
  .setup-note { background: #1a4a6e; border-radius: 12px; padding: 20px; font-size: 13px; color: #cce8f5; max-width: 520px; line-height: 1.8; }
  .setup-note code { background: #ffffff18; padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  .setup-note b { color: #fff; }
  .setup-note ol { margin-left: 18px; margin-top: 8px; }
  .bubbles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
  .bubble { position: absolute; border-radius: 50%; background: #ffffff08; animation: rise linear infinite; }
  @keyframes rise { 0%{transform:translateY(100vh) scale(0);opacity:0} 20%{opacity:1} 100%{transform:translateY(-10vh) scale(1);opacity:0} }
  .poster, .gallery-wrap, .error-msg, .setup-note { position: relative; z-index: 1; }
  .back-link { text-align:center; margin-top:14px; }
  .back-link a { color:#85c4e0; font-size:13px; text-decoration:none; }
</style>
</head>
<body>
<div class="bubbles" id="bubbles"></div>
<div id="app"><div class="center-msg">🐟 Loading museum data...</div></div>

<script>
/* ============================================================
   ✏️  EDIT ONLY THESE TWO LINES
   ============================================================ */
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRq352kenIOG0RiBtCgt3LmFLD4bLP1QkTxZjpucDg5CZaqpJpbKOgJqaL5AyPW-osMgGmbRlojW9bL/pub?output=csv";
const BASE_URL      = "https://github.com/Yogeshfins/fish-museum";

/* ============================================================
   Column name mappings
   List every possible column name your Google Form might use.
   The "Fish Photo" entry should match your Form's file-upload
   question title exactly.
   ============================================================ */
const COL = {
  commonName:   ["Common Name","common_name","Name","Species"],
  sciName:      ["Scientific Name","scientific_name","Sci Name"],
  order:        ["Order","order"],
  family:       ["Family","family"],
  food:         ["Food & Feeding","food_feeding","Food","Feeding"],
  reproduction: ["Reproduction","reproduction","Repro"],
  habitat:      ["Habitat & Distribution","habitat","Distribution"],
  gears:        ["Gears Used","gears","Gear"],
  commercial:   ["Commercial Note","commercial","Market"],
  // ↓ This must match your Form's "File Upload" question title
  photo:        ["Fish Photo","Photo","Image","Fish Image","Upload Photo","Picture"],
};

/* ============================================================
   Extract a Drive file ID from any Drive URL format
   Handles:
     https://drive.google.com/open?id=FILE_ID
     https://drive.google.com/file/d/FILE_ID/view
     https://drive.google.com/uc?id=FILE_ID
     Raw file ID (no slashes)
   ============================================================ */
function extractDriveId(raw) {
  if (!raw) return null;
  raw = raw.trim();

  // Already a raw ID (no slashes, looks like a Drive ID)
  if (/^[a-zA-Z0-9_-]{25,}$/.test(raw)) return raw;

  // ?id= param
  let m = raw.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return m[1];

  // /d/FILE_ID/
  m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];

  return null;
}

function driveImgUrl(raw) {
  const id = extractDriveId(raw);
  if (!id) return null;
  // thumbnail endpoint — works without login, no CORS issues
  return `https://drive.google.com/thumbnail?id=${id}&sz=w400`;
}

/* ============================================================
   CSV parser
   ============================================================ */
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i]||"").trim().replace(/^"|"$/g,""));
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function splitLine(line) {
  const result=[]; let cur="", inQ=false;
  for (let i=0; i<line.length; i++) {
    const ch=line[i];
    if (ch==='"') { inQ=!inQ; continue; }
    if (ch===',' && !inQ) { result.push(cur); cur=""; continue; }
    cur+=ch;
  }
  result.push(cur);
  return result;
}

function getVal(row, candidates) {
  for (const c of candidates) {
    const key = Object.keys(row).find(k => k.trim().toLowerCase() === c.toLowerCase());
    if (key && row[key] && row[key].trim()) return row[key].trim();
  }
  return "";
}

function slugify(name) {
  return (name||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
}

/* ============================================================
   Render poster
   ============================================================ */
function renderPoster(sp) {
  const imgSrc = driveImgUrl(sp.photo);
  const imgHtml = imgSrc
    ? `<img src="${imgSrc}" alt="${sp.commonName}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
       <div class="fish-img-placeholder" style="display:none">🐟 Image not accessible<br><small>Check Drive sharing</small></div>`
    : `<div class="fish-img-placeholder">🐟 No image uploaded</div>`;

  document.getElementById("app").innerHTML = `
    <div class="poster">
      <div class="poster-header">
        <div class="logo-row">
          <div class="logo">🐟</div>
          <div class="uni-text">
            <div class="uni">West Bengal University of Animal &amp; Fishery Sciences</div>
            <div class="faculty">Faculty of Fishery Sciences</div>
            <div class="dept">Department of Fisheries Resource Management</div>
          </div>
        </div>
      </div>
      <div class="poster-body">
        <div class="fish-name">${sp.commonName||"—"}</div>
        <div class="sci-name">${sp.sciName||""}</div>
        <div class="fish-img-wrap">${imgHtml}</div>
        <div class="divider"></div>
        <div class="section-title">Taxonomy &amp; Biology</div>
        <div class="info-row"><b>Order:</b> ${sp.order||"—"} &nbsp;&nbsp; <b>Family:</b> ${sp.family||"—"}</div>
        ${sp.food?`<div class="info-row" style="margin-top:4px"><b>Food &amp; Feeding:</b> ${sp.food}</div>`:""}
        ${sp.reproduction?`<div class="info-row" style="margin-top:4px"><b>Reproduction:</b> ${sp.reproduction}</div>`:""}
        ${sp.habitat?`<div class="divider"></div><div class="section-title">Habitat &amp; Distribution</div><div class="info-block">${sp.habitat}</div>`:""}
        ${sp.gears?`<div class="divider"></div><div class="section-title">Gears Used</div><div class="info-block">${sp.gears}</div>`:""}
        ${sp.commercial?`<div class="commercial-note">${sp.commercial}</div>`:""}
      </div>

    </div>
    <div class="btn-row">
      <a class="btn-explore" href="${BASE_URL}">🐟 Explore All Species</a>
      <button class="btn-download" onclick="downloadPoster()">⬇ Download This Page</button>
    </div>`;
}

/* ============================================================
   Render gallery
   ============================================================ */
function renderGallery(species) {
  document.getElementById("app").innerHTML = `
    <div class="gallery-wrap">
      <div class="gallery-header">
        <h1>🐟 Fish Museum</h1>
        <p>West Bengal University of Animal &amp; Fishery Sciences</p>
        <p class="gallery-dept">Department of Fisheries Resource Management</p>
      </div>
      <input class="search-bar" id="search" placeholder="Search by name, family, order…" oninput="filterCards()" />
      <div class="species-grid" id="grid">
        ${species.map(sp=>`
          <a class="species-card" href="?id=${slugify(sp.commonName)}">
            <div class="cn">${sp.commonName||"—"}</div>
            <div class="sn">${sp.sciName||""}</div>
            <div class="fam">${[sp.order,sp.family].filter(Boolean).join(" · ")}</div>
          </a>`).join("")}
      </div>
    </div>`;
  window._allSpecies = species;
}

function filterCards() {
  const q = document.getElementById("search").value.toLowerCase();
  const grid = document.getElementById("grid");
  window._allSpecies.forEach((sp,i) => {
    const match = [sp.commonName,sp.sciName,sp.order,sp.family].join(" ").toLowerCase().includes(q);
    grid.children[i].style.display = match ? "" : "none";
  });
}

/* ============================================================
   Boot
   ============================================================ */
function downloadPoster() {
  const poster = document.querySelector('.poster');
  if (!poster) return;
  // Use browser print-to-PDF as the most reliable cross-device download
  const name = document.querySelector('.fish-name');
  const title = name ? name.textContent.trim().replace(/\s+/g,'-').toLowerCase() : 'fish-poster';
  // Clone poster into a print window
  const win = window.open('', '_blank', 'width=600,height=900');
  win.document.write(`<!DOCTYPE html><html><head><title>${title}</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:#fff; }
    @media print { body { -webkit-print-color-adjust:exact; print-color-adjust:exact; } }
  </style></head><body>`);
  win.document.write(poster.outerHTML);
  win.document.write('</body></html>');
  win.document.close();
  win.onload = () => { win.focus(); win.print(); };
}

async function boot() {
  const wrap = document.getElementById("bubbles");
  for (let i=0; i<12; i++) {
    const b=document.createElement("div"); b.className="bubble";
    const s=20+Math.random()*60;
    b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
    wrap.appendChild(b);
  }

  if (SHEET_CSV_URL === "YOUR_GOOGLE_SHEET_CSV_URL_HERE") {
    document.getElementById("app").innerHTML = `
      <div class="setup-note">
        <b>⚙️ Two things to set up:</b>
        <ol>
          <li>Open this file and replace <code>SHEET_CSV_URL</code> with your Google Sheet's published CSV link.<br>
              <small>(Sheet → File → Share → Publish to web → CSV)</small></li>
          <li>Replace <code>BASE_URL</code> with your GitHub Pages URL.</li>
        </ol>
        <br>
        <b>📋 Important — Google Drive image sharing:</b><br>
        When Google Forms saves uploaded photos to Drive, they go into a folder.<br>
        You must set that folder to <b>"Anyone with the link can view"</b> so the images display.<br>
        <small>Drive folder → Right-click → Share → Change to "Anyone with link"</small>
      </div>`;
    return;
  }

  let species = [];
  try {
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const rows = parseCSV(await res.text());
    species = rows.map(row => ({
      commonName:   getVal(row, COL.commonName),
      sciName:      getVal(row, COL.sciName),
      order:        getVal(row, COL.order),
      family:       getVal(row, COL.family),
      food:         getVal(row, COL.food),
      reproduction: getVal(row, COL.reproduction),
      habitat:      getVal(row, COL.habitat),
      gears:        getVal(row, COL.gears),
      commercial:   getVal(row, COL.commercial),
      photo:        getVal(row, COL.photo),
    })).filter(sp => sp.commonName);
  } catch(e) {
    document.getElementById("app").innerHTML = `
      <div class="error-msg">
        <b>Could not load species data.</b><br>
        Error: ${e.message}<br><br>
        Check that your Sheet is published as CSV and publicly accessible.
      </div>`;
    return;
  }

  const id = new URLSearchParams(window.location.search).get("id");
  if (id) {
    const sp = species.find(s => slugify(s.commonName) === id);
    if (sp) { renderPoster(sp); return; }
    document.getElementById("app").innerHTML = `<div class="center-msg">Species not found.<br><a href="${BASE_URL}" style="color:#85c4e0;">← All species</a></div>`;
    return;
  }
  renderGallery(species);
}

boot();
</script>
</body>
</html>
